name: eu_adulto
description: Assistente financeiro para jovens adultos.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0
  tutorial_coach_mark: ^1.3.3

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.1
  uuid: ^4.4.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon_app.png"

flutter:
  uses-material-design: true
